<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a0e">
<title>Chef IA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --warm-white: #faf8f3;
    --olive: #4a5240;
    --olive-light: #6b7560;
    --gold: #c9a84c;
    --gold-light: #e8c96d;
    --terracotta: #c4623a;
    --terracotta-light: #e07a52;
    --dark: #1a1a0e;
    --dark-mid: #2d2d1e;
    --text-muted: #8a8878;
    --border: rgba(74,82,64,0.15);
    --shadow: 0 8px 32px rgba(26,26,14,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* LANGUAGE TOGGLE */
  .lang-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 1000;
    display: flex;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }
  .lang-btn {
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .lang-btn.active {
    background: var(--gold);
    color: var(--dark);
  }

  /* HERO HEADER */
  .hero {
    padding: 60px 24px 40px;
    text-align: center;
    position: relative;
    background: linear-gradient(180deg, #2d2d1e 0%, var(--dark) 100%);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-icon {
    font-size: 48px;
    margin-bottom: 12px;
    display: block;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .hero h1 span { color: var(--gold); font-style: italic; }
  .hero p {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
    max-width: 280px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* MAIN CONTENT */
  .main { padding: 0 16px 100px; max-width: 500px; margin: 0 auto; }

  /* INPUT SECTION */
  .input-card {
    background: var(--dark-mid);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .input-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* PHOTO UPLOAD */
  .photo-area {
    border: 2px dashed rgba(201,168,76,0.3);
    border-radius: 14px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    background: rgba(201,168,76,0.03);
  }
  .photo-area:hover, .photo-area.dragover {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
  }
  .photo-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .photo-area .icon { font-size: 32px; margin-bottom: 8px; }
  .photo-area p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .photo-area strong { color: var(--cream); font-weight: 500; }
  .photo-preview {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 10px;
    display: none;
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* TEXT INPUT */
  .ingredients-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 90px;
    transition: border 0.2s;
    outline: none;
  }
  .ingredients-input:focus { border-color: rgba(201,168,76,0.5); }
  .ingredients-input::placeholder { color: var(--text-muted); }

  /* PREFERENCES ROW */
  .prefs-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .pref-chip {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .pref-chip.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* COOK BUTTON */
  .cook-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--terracotta), var(--terracotta-light));
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 16px;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .cook-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(196,98,58,0.4); }
  .cook-btn:active { transform: translateY(0); }
  .cook-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* LOADING */
  .loading-state {
    text-align: center;
    padding: 48px 24px;
    display: none;
  }
  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { color: var(--text-muted); font-size: 14px; }
  .loading-state .loading-tip {
    margin-top: 12px;
    font-size: 12px;
    color: rgba(201,168,76,0.6);
    font-style: italic;
  }

  /* RECIPE LIST */
  .recipes-section { display: none; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--cream);
  }
  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--gold); color: var(--gold); }

  .recipe-card {
    background: var(--dark-mid);
    border: 1px solid var(--border);
    border-radius: 18px;
    margin-bottom: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s;
  }
  .recipe-card:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-2px); }
  .recipe-card-header {
    padding: 18px 18px 14px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .recipe-emoji { font-size: 36px; flex-shrink: 0; }
  .recipe-info { flex: 1; min-width: 0; }
  .recipe-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--cream);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .recipe-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .recipe-meta {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .meta-badge {
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-time { background: rgba(201,168,76,0.12); color: var(--gold); }
  .badge-diff { background: rgba(74,82,64,0.3); color: var(--olive-light); }
  .badge-diff.easy { background: rgba(74,164,74,0.12); color: #6ac96a; }
  .badge-diff.medium { background: rgba(201,168,76,0.12); color: var(--gold); }
  .badge-cals { background: rgba(196,98,58,0.12); color: var(--terracotta-light); }

  .recipe-arrow {
    color: var(--text-muted);
    font-size: 18px;
    margin-left: 4px;
    flex-shrink: 0;
    align-self: center;
  }

  /* FULL RECIPE VIEW */
  .recipe-detail { display: none; }

  .recipe-detail-hero {
    background: linear-gradient(135deg, var(--dark-mid), rgba(45,45,30,0.8));
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    text-align: center;
  }
  .recipe-detail-emoji { font-size: 64px; display: block; margin-bottom: 12px; }
  .recipe-detail-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--cream);
    margin-bottom: 8px;
  }
  .recipe-detail-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; }
  .recipe-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .stat-box {
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat-value { font-size: 18px; font-weight: 500; color: var(--gold); display: block; }
  .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* NUTRITION CARD */
  .nutrition-card {
    background: var(--dark-mid);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .nutrition-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nutrition-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }
  .nutrition-item {
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .nutrition-item .n-val { font-size: 20px; font-weight: 500; color: var(--cream); }
  .nutrition-item .n-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .nutrition-item .n-why { font-size: 10px; color: rgba(201,168,76,0.6); margin-top: 4px; font-style: italic; }

  /* INGREDIENTS SECTION */
  .section-card {
    background: var(--dark-mid);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .section-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ingredient-list { list-style: none; }
  .ingredient-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .ingredient-item:last-child { border-bottom: none; }
  .ingredient-check {
    width: 20px;
    height: 20px;
    border: 1.5px solid rgba(201,168,76,0.4);
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.2s;
  }
  .ingredient-check.checked { background: var(--gold); border-color: var(--gold); }
  .ingredient-check.checked::after { content: '✓'; font-size: 11px; color: var(--dark); font-weight: 700; }
  .ingredient-text { flex: 1; font-size: 14px; line-height: 1.4; }
  .ingredient-amount { font-weight: 500; color: var(--cream); }
  .ingredient-name { color: var(--text-muted); }

  /* TOOLS NEEDED */
  .tools-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tool-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--cream);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* STEPS */
  .steps-list { list-style: none; }
  .step-item {
    display: flex;
    gap: 14px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .step-item:last-child { border-bottom: none; }
  .step-number {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(201,168,76,0.15);
    border: 1.5px solid rgba(201,168,76,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--gold);
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.2s;
  }
  .step-number.done { background: var(--gold); border-color: var(--gold); color: var(--dark); }
  .step-content { flex: 1; }
  .step-action { font-size: 14px; line-height: 1.6; color: var(--cream); margin-bottom: 6px; }
  .step-tip {
    font-size: 12px;
    color: rgba(201,168,76,0.8);
    background: rgba(201,168,76,0.06);
    border-left: 2px solid rgba(201,168,76,0.4);
    padding: 6px 10px;
    border-radius: 0 6px 6px 0;
    line-height: 1.5;
    margin-top: 6px;
  }
  .step-warning {
    font-size: 12px;
    color: rgba(196,98,58,0.9);
    background: rgba(196,98,58,0.06);
    border-left: 2px solid rgba(196,98,58,0.4);
    padding: 6px 10px;
    border-radius: 0 6px 6px 0;
    line-height: 1.5;
    margin-top: 6px;
  }

  /* STORAGE & TIPS */
  .tips-list { list-style: none; }
  .tip-row {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .tip-row:last-child { border-bottom: none; }
  .tip-icon { flex-shrink: 0; }

  /* ERROR */
  .error-state {
    background: rgba(196,98,58,0.1);
    border: 1px solid rgba(196,98,58,0.3);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    display: none;
  }
  .error-state p { font-size: 14px; color: var(--terracotta-light); line-height: 1.5; }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.4s ease forwards; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }
</style>
</head>
<body>

<!-- LANGUAGE TOGGLE -->
<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('es')" id="btn-es">ES</button>
  <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
</div>

<!-- HERO -->
<div class="hero">
  <span class="hero-icon">👨‍🍳</span>
  <h1 id="hero-title">Chef <span>IA</span></h1>
  <p id="hero-sub">Tu asistente de cocina personal. Toma una foto de tus ingredientes o escríbelos.</p>
</div>

<div class="main">

  <!-- INPUT SECTION -->
  <div id="input-section">
    <div class="input-card">
      <h3>📸 <span id="label-photo">Foto de ingredientes</span></h3>
      <div class="photo-area" id="photo-area" onclick="document.getElementById('photo-input').click()">
        <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="handlePhoto(event)">
        <img class="photo-preview" id="photo-preview">
        <div id="photo-placeholder">
          <div class="icon">📷</div>
          <p><strong id="label-tap">Toca para tomar foto</strong><br><span id="label-or-gallery">o selecciona de tu galería</span></p>
        </div>
      </div>
    </div>

    <div class="input-card">
      <h3>✏️ <span id="label-type">Escribe tus ingredientes</span></h3>
      <textarea class="ingredients-input" id="ingredients-text" placeholder="" rows="3"></textarea>
      <div class="prefs-row">
        <button class="pref-chip" data-pref="estufa" onclick="togglePref(this)" id="chip-stove">🔥 Solo estufa</button>
        <button class="pref-chip" data-pref="horno" onclick="togglePref(this)" id="chip-oven">♨️ Solo horno</button>
        <button class="pref-chip" data-pref="rapido" onclick="togglePref(this)" id="chip-quick">⚡ Rápido</button>
        <button class="pref-chip active" data-pref="principiante" onclick="togglePref(this)" id="chip-beginner">🌱 Principiante</button>
      </div>
    </div>

    <button class="cook-btn" id="find-btn" onclick="findRecipes()">
      <span>🍽️</span> <span id="btn-find">Encontrar Recetas</span>
    </button>

    <div class="error-state" id="error-box">
      <p id="error-msg"></p>
    </div>
  </div>

  <!-- LOADING -->
  <div class="loading-state" id="loading-state">
    <div class="loading-spinner"></div>
    <p id="loading-text">Analizando ingredientes...</p>
    <p class="loading-tip" id="loading-tip">Identificando qué puedes cocinar hoy</p>
  </div>

  <!-- RECIPE LIST -->
  <div class="recipes-section" id="recipes-section">
    <div class="section-header">
      <h2 class="section-title" id="label-recipes">Recetas para ti</h2>
      <button class="back-btn" onclick="goBack('recipes')" id="btn-back-main">← <span id="label-new">Nueva búsqueda</span></button>
    </div>
    <div id="recipes-list"></div>
  </div>

  <!-- RECIPE DETAIL -->
  <div class="recipe-detail" id="recipe-detail">
    <div class="section-header" style="margin-bottom:16px;">
      <button class="back-btn" onclick="goBack('detail')" id="btn-back-recipes">← <span id="label-back-recipes">Ver recetas</span></button>
    </div>
    <div id="recipe-detail-content"></div>
  </div>

</div>

function t(key) { return T[currentLang][key] || key; }

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-es').classList.toggle('active', lang === 'es');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  updateUI();
}

function updateUI() {
  document.getElementById('hero-sub').textContent = t('heroSub');
  document.getElementById('label-photo').textContent = t('labelPhoto');
  document.getElementById('label-tap').textContent = t('labelTap');

  document.getElementById('label-new').textContent = t('labelNew');
  document.getElementById('label-back-recipes').textContent = t('labelBackRecipes');

function togglePref(el) {
  el.classList.toggle('active');
  const pref = el.dataset.pref;
  if (activePrefs.includes(pref)) {
    activePrefs = activePrefs.filter(p => p !== pref);
  } else {
    activePrefs.push(pref);
  }
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    photoMime = file.type;
    photoBase64 = dataUrl.split(',')[1];
    const preview = document.getElementById('photo-preview');
    preview.src = dataUrl;
    preview.style.display = 'block';
    document.getElementById('photo-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function showError(msg) {
  const box = document.getElementById('error-box');
  document.getElementById('error-msg').textContent = msg;
  box.style.display = 'block';
  setTimeout(() => box.style.display = 'none', 5000);
}

function goBack(from) {
  if (from === 'detail') {
    document.getElementById('recipe-detail').style.display = 'none';
    document.getElementById('recipes-section').style.display = 'block';
  } else {
    document.getElementById('recipes-section').style.display = 'none';
    document.getElementById('input-section').style.display = 'block';
  }
  window.scrollTo(0, 0);
}

async function findRecipes() {
  const text = document.getElementById('ingredients-text').value.trim();
  if (!photoBase64 && !text) { showError(t('errorNoInput')); return; }

  document.getElementById('input-section').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('loading-state').style.display = 'block';
  document.getElementById('loading-text').textContent = t('loading1');
  document.getElementById('loading-tip').textContent = t('loading2');

  try {
    const ingredients = await identifyIngredients(text, photoBase64, photoMime);
    const recipes = await getRecipesFromGemini(ingredients);
    currentRecipes = recipes;
    displayRecipeList(recipes);
  } catch(err) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('input-section').style.display = 'block';
    showError(t('errorApi') + ' ' + err.message);
  }
}

async function identifyIngredients(text, b64, mime) {
  if (b64) {
    const body = {
      contents: [{
        parts: [
          { inline_data: { mime_type: mime, data: b64 } },
          { text: currentLang === 'es'
            ? 'Identifica todos los ingredientes de comida visibles en esta imagen. Devuelve solo una lista simple separada por comas.'
            : 'Identify all food ingredients visible in this image. Return only a simple comma-separated list.' }
        ]
      }]
    };
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const detected = data.candidates[0].content.parts[0].text;
    return text ? detected + ', ' + text : detected;
  }
  return text;
}

async function getRecipesFromGemini(ingredients) {
  const prefs = activePrefs.join(', ');
  const isES = currentLang === 'es';
  const prompt = isES
    ? `Soy un principiante total en cocina. Tengo estos ingredientes: ${ingredients}. Preferencias: ${prefs}. Solo uso estufa y horno (sin microondas ni airfryer).
Sugiere exactamente 4 recetas que pueda hacer. Para cada receta devuelve un JSON con este formato EXACTO:
{"recipes":[{"name":"nombre","emoji":"emoji relevante","description":"descripción corta apetitosa en 1-2 oraciones","prepTime":15,"cookTime":25,"servings":2,"difficulty":"Fácil","ingredients":[{"amount":"2","unit":"pechugas","name":"de pollo, sin hueso"}],"tools":["sartén grande","tabla de cortar"],"steps":[{"action":"Instrucción detallada para principiante explicando el cómo y el porqué","tip":"consejo útil opcional","warning":"advertencia opcional si aplica"}],"nutrition":{"calories":450,"protein":35,"carbs":40,"fat":12,"fiber":5},"storage":"Cómo guardar las sobras","substitutions":"Qué ingredientes se pueden cambiar"}]}
Solo responde con el JSON, sin texto adicional.`
    : `I am a total beginner at cooking. I have these ingredients: ${ingredients}. Preferences: ${prefs}. I only use stovetop and oven (no microwave or air fryer).
Suggest exactly 4 recipes I can make. For each recipe return a JSON with this EXACT format:
{"recipes":[{"name":"name","emoji":"relevant emoji","description":"short appetizing description in 1-2 sentences","prepTime":15,"cookTime":25,"servings":2,"difficulty":"Easy","ingredients":[{"amount":"2","unit":"breasts","name":"chicken, boneless"}],"tools":["large pan","cutting board"],"steps":[{"action":"Detailed beginner instruction explaining how and why","tip":"optional useful tip","warning":"optional warning if applicable"}],"nutrition":{"calories":450,"protein":35,"carbs":40,"fat":12,"fiber":5},"storage":"How to store leftovers","substitutions":"What ingredients can be swapped"}]}
Respond ONLY with the JSON, no extra text.`;

  const body = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7, maxOutputTokens: 4000 } };
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  let raw = data.candidates[0].content.parts[0].text.trim();
  raw = raw.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(raw);
  return parsed.recipes;
}

async function getNutrition(recipeName, ingredients) {
  try {
    const ingList = ingredients.map(i => `${i.amount} ${i.unit} ${i.name}`).join('\n');
    const res = await fetch(`https://api.edamam.com/api/nutrition-details?app_id=${EDAMAM_ID}&app_key=${EDAMAM_KEY}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ title: recipeName, ingr: ingList.split('\n') })
    });
    if (!res.ok) return null;
    const data = await res.json();
    const cal = Math.round(data.calories / (data.yield || 2));
    const nutrients = data.totalNutrients;
    return {
      calories: cal,
      protein: Math.round((nutrients.PROCNT?.quantity || 0) / (data.yield || 2)),
      carbs: Math.round((nutrients.CHOCDF?.quantity || 0) / (data.yield || 2)),
      fat: Math.round((nutrients.FAT?.quantity || 0) / (data.yield || 2)),
      fiber: Math.round((nutrients.FIBTG?.quantity || 0) / (data.yield || 2)),
    };
  } catch { return null; }
}

function difficultyClass(d) {
  const lower = d.toLowerCase();
  if (lower.includes('fácil') || lower.includes('easy')) return 'easy';
  if (lower.includes('medio') || lower.includes('medium')) return 'medium';
  return 'hard';
}

function displayRecipeList(recipes) {
  document.getElementById('loading-state').style.display = 'none';
  if (!recipes || recipes.length === 0) {
    document.getElementById('input-section').style.display = 'block';
    showError(t('noRecipes'));
    return;
  }
  const list = document.getElementById('recipes-list');
  list.innerHTML = '';
  recipes.forEach((r, i) => {
    const dc = difficultyClass(r.difficulty);
    const card = document.createElement('div');
    card.className = 'recipe-card fade-up';
    card.style.animationDelay = `${i * 0.08}s`;
    card.innerHTML = `
      <div class="recipe-card-header">
        <div class="recipe-emoji">${r.emoji}</div>
        <div class="recipe-info">
          <div class="recipe-name">${r.name}</div>
          <div class="recipe-desc">${r.description}</div>
          <div class="recipe-meta">
            <span class="meta-badge badge-time">⏱ ${r.prepTime + r.cookTime} ${t('min')}</span>
            <span class="meta-badge badge-diff ${dc}">${r.difficulty}</span>
            <span class="meta-badge badge-cals">🔥 ~${r.nutrition.calories} kcal</span>
          </div>
        </div>
        <div class="recipe-arrow">›</div>
      </div>`;
    card.onclick = () => showRecipeDetail(i);
    list.appendChild(card);
  });
  document.getElementById('recipes-section').style.display = 'block';
  window.scrollTo(0, 0);
}
